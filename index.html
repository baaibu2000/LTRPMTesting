<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f6f8;
    }

    header {
        background-color: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }

    .container {
        padding: 10px;
    }

    .table-wrapper {
        overflow-x: auto;
        max-height: 80vh;
        border: 1px solid #ccc;
        background: white;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        min-width: 1400px;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
        vertical-align: top;
        word-wrap: break-word;
        white-space: normal;
    }

    th {
        position: sticky;
        top: 0;
        background-color: #34495e;
        color: white;
        z-index: 2;
    }

    tr:nth-child(even) {
        background-color: #f9f9f9;
    }

    tr:hover {
        background-color: #eef3f7;
    }

    @media (max-width: 768px) {
        th, td {
            font-size: 12px;
            padding: 6px;
        }
    }
</style>
</head>
